name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: x86_64-linux-gnu
            ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: aarch64-linux-gnu
            ext: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-13
            artifact: x86_64-apple-darwin
            ext: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: aarch64-apple-darwin
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: x86_64-pc-windows-msvc
            ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p syncara

      - name: Strip binary
        if: matrix.ext == 'tar.gz'
        run: strip "target/${{ matrix.target }}/release/syncara"

      - name: Package (tar.gz)
        if: matrix.ext == 'tar.gz'
        run: |
          cd "target/${{ matrix.target }}/release"
          VERSION="${GITHUB_REF_NAME#v}"
          tar czf "syncara-$VERSION-${{ matrix.artifact }}.tar.gz" syncara
          echo "ASSET=syncara-$VERSION-${{ matrix.artifact }}.tar.gz" >> $GITHUB_ENV

      - name: Package (zip)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          $VERSION = "$env:GITHUB_REF_NAME" -replace '^v'
          cd "target\${{ matrix.target }}\release"
          Compress-Archive -Path syncara.exe -DestinationPath "syncara-$VERSION-${{ matrix.artifact }}.zip"
          echo "ASSET=syncara-$VERSION-${{ matrix.artifact }}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Generate checksum
        if: matrix.ext == 'tar.gz'
        working-directory: target/${{ matrix.target }}/release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sha256sum "syncara-$VERSION-${{ matrix.artifact }}.tar.gz" > "syncara-$VERSION-${{ matrix.artifact }}.sha256"

      - name: Generate checksum (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        working-directory: target/${{ matrix.target }}/release
        run: |
          $VERSION = "$env:GITHUB_REF_NAME" -replace '^v'
          $hash = (Get-FileHash "syncara-$VERSION-${{ matrix.artifact }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  syncara-$VERSION-${{ matrix.artifact }}.zip" | Out-File -FilePath "syncara-$VERSION-${{ matrix.artifact }}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syncara-${{ matrix.artifact }}
          path: |
            target/${{ matrix.target }}/release/syncara-${{ github.ref_name != '' && '*.tar.gz' || '' }}
            target/${{ matrix.target }}/release/syncara-${{ github.ref_name != '' && '*.zip' || '' }}
            target/${{ matrix.target }}/release/syncara-${{ github.ref_name != '' && '*.sha256' || '' }}

  release:
    name: Create release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Extract SHA256 values
        id: sha256
        working-directory: dist
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          for f in *.sha256; do
            key="${f%.sha256}"
            key="${key#syncara-$VERSION-}"
            key="${key//-/_}"
            key="${key//./_}"
            value="$(awk '{print $1}' "$f")"
            echo "${key}=${value}" >> $GITHUB_OUTPUT
          done

      - name: Generate Homebrew formula
        env:
          VERSION: ${{ steps.sha256.outputs.version }}
          MACOS_ARM64_SHA256: ${{ steps.sha256.outputs.aarch64_apple_darwin }}
          MACOS_X86_64_SHA256: ${{ steps.sha256.outputs.x86_64_apple_darwin }}
          LINUX_ARM64_SHA256: ${{ steps.sha256.outputs.aarch64_linux_gnu }}
          LINUX_X86_64_SHA256: ${{ steps.sha256.outputs.x86_64_linux_gnu }}
        run: |
          bash scripts/generate-formula.sh > dist/syncara.rb

      - name: List distribution files
        working-directory: dist
        run: ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Syncara ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/syncara.rb
