listeners:
  - port: 8080

pools:
  - name: web
    upstreams:
      - addr: "localhost:9001"
    health:
      path: /
      interval: "30s"

routes:
  - path: /
    pool: web

security:
  rate_limit:
    enabled: true
    requests_per_minute: 5
  connections:
    max_active: 100
    websocket_max: 50
  request_timeout: "30s"
  upstream_timeout: "10s"
  websocket_timeout: "30m"

logging:
  level: info
  format: text
